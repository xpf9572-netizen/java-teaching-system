server:
  port: 22222

spring:
  application:
    name: student-admin-backend

  datasource:
    url: jdbc:h2:file:./data/studentdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd
    time-zone: Asia/Shanghai

jwt:
  secret: mySecretKeyForJwtTokenGenerationAndValidation2024StudentAdminSystem
  expiration: 86400000

logging:
  level:
    com.teach: DEBUG
    org.springframework.security: DEBUG
